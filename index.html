<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelPay Pro - Histórico Semanal</title>
    <style>
        :root {
            --primary: #003366;
            --secondary: #00509d;
            --accent: #00a8e8;
            --light: #f0f4f8;
            --white: #ffffff;
            --danger: #d90429;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 10px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        input, select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        button {
            padding: 12px;
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background-color: var(--accent); }

        .btn-danger { background-color: var(--danger); margin-top: 10px; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }

        th { background: var(--primary); color: white; padding: 10px; }
        td { border-bottom: 1px solid #eee; padding: 10px; text-align: center; }

        .summary-box {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            border-left: 5px solid var(--primary);
        }

        .settlement-item {
            padding: 8px;
            border-bottom: 1px dashed var(--secondary);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Control de Gastos</h1>
    
    <div style="background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
        <p><strong>1. Configura tus Amigos:</strong></p>
        <div class="grid-inputs">
            <input type="text" id="friendName" placeholder="Nombre">
            <button onclick="addFriend()">+ Añadir Amigo</button>
        </div>
        <div id="friendsList" style="font-weight: bold; color: var(--secondary);"></div>
    </div>

    <div style="border: 1px solid #eee; padding: 15px; border-radius: 10px;">
        <p><strong>2. Registrar Gasto del Día:</strong></p>
        <div class="grid-inputs">
            <input type="date" id="expenseDate">
            <select id="payerSelect"><option value="">¿Quién pagó?</option></select>
            <input type="number" id="amountInput" placeholder="Monto (MXN)">
            <input type="text" id="descInput" placeholder="Concepto (ej: Cabaña)">
        </div>
        <button style="width: 100%;" onclick="addExpense()">💾 Guardar Gasto en Historial</button>
    </div>

    <h2>📅 Historial Semanal</h2>
    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Pagó</th>
                    <th>Concepto</th>
                    <th>Monto (MXN)</th>
                </tr>
            </thead>
            <tbody id="historyTable"></tbody>
        </table>
    </div>

    <div class="summary-box">
        <h2>💰 Liquidación Final</h2>
        <div id="settlementResults">Aquí aparecerán las deudas...</div>
    </div>

    <button class="btn-danger" onclick="clearData()">⚠️ Borrar Todo el Viaje</button>
</div>

<script>
    let friends = JSON.parse(localStorage.getItem('tripFriends')) || [];
    let expenses = JSON.parse(localStorage.getItem('tripExpenses')) || [];

    // Inicializar al cargar
    window.onload = () => {
        updateFriendUI();
        renderHistory();
        calculateSettlements();
        document.getElementById('expenseDate').valueAsDate = new Date();
    };

    function addFriend() {
        const name = document.getElementById('friendName').value.trim();
        if (name && !friends.includes(name)) {
            friends.push(name);
            save();
            updateFriendUI();
            document.getElementById('friendName').value = '';
        }
    }

    function updateFriendUI() {
        document.getElementById('friendsList').textContent = friends.length > 0 ? "Grupo: " + friends.join(', ') : "";
        const select = document.getElementById('payerSelect');
        select.innerHTML = '<option value="">¿Quién pagó?</option>';
        friends.forEach(f => {
            const opt = document.createElement('option');
            opt.value = f; opt.textContent = f;
            select.appendChild(opt);
        });
    }

    function addExpense() {
        const date = document.getElementById('expenseDate').value;
        const payer = document.getElementById('payerSelect').value;
        const amount = parseFloat(document.getElementById('amountInput').value);
        const desc = document.getElementById('descInput').value;

        if (date && payer && amount > 0) {
            expenses.push({ date, payer, amount, desc });
            save();
            renderHistory();
            calculateSettlements();
            document.getElementById('amountInput').value = '';
            document.getElementById('descInput').value = '';
        } else {
            alert("Por favor llena todos los campos correctamente.");
        }
    }

    function renderHistory() {
        const table = document.getElementById('historyTable');
        table.innerHTML = "";
        expenses.forEach(e => {
            table.innerHTML += `<tr>
                <td>${e.date}</td>
                <td>${e.payer}</td>
                <td>${e.desc}</td>
                <td>$${e.amount.toLocaleString()}</td>
            </tr>`;
        });
    }

    function calculateSettlements() {
        if (friends.length === 0) return;
        let balances = {};
        friends.forEach(f => balances[f] = 0);

        expenses.forEach(e => {
            const share = e.amount / friends.length;
            friends.forEach(f => {
                if (f === e.payer) balances[f] += (e.amount - share);
                else balances[f] -= share;
            });
        });

        const results = document.getElementById('settlementResults');
        results.innerHTML = "";

        let creditors = [], debtors = [];
        for (let f in balances) {
            if (balances[f] > 0.1) creditors.push({name: f, amt: balances[f]});
            else if (balances[f] < -0.1) debtors.push({name: f, amt: Math.abs(balances[f])});
        }

        if (debtors.length === 0) {
            results.innerHTML = "Todo está saldado.";
            return;
        }

        debtors.forEach(d => {
            creditors.forEach(c => {
                if (d.amt > 0 && c.amt > 0) {
                    let move = Math.min(d.amt, c.amt);
                    results.innerHTML += `<div class="settlement-item">
                        <b>${d.name}</b> le debe a <b>${c.name}</b>: 
                        <span style="color:var(--primary)">$${move.toFixed(2)} MXN</span>
                    </div>`;
                    d.amt -= move; c.amt -= move;
                }
            });
        });
    }

    function save() {
        localStorage.setItem('tripFriends', JSON.stringify(friends));
        localStorage.setItem('tripExpenses', JSON.stringify(expenses));
    }

    function clearData() {
        if(confirm("¿Estás seguro de borrar todo el historial?")) {
            localStorage.clear();
            location.reload();
        }
    }
</script>
</body>
</html>
